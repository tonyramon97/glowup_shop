<!DOCTYPE html>
<html class="light" lang="es">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, viewport-fit=cover" name="viewport"/>
<title>Glowup Store</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link rel="apple-touch-icon" href="icon-192.png"/>
<link rel="manifest" href="manifest.json"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Glowup Store"/>
<meta name="theme-color" content="#2a14b4"/>
<script>
tailwind.config = {
  darkMode: "class",
  theme: {
    extend: {
      colors: {
        "surface-bright": "#f9f9ff",
        "on-secondary-fixed": "#07006c",
        "secondary-fixed": "#e1e0ff",
        "tertiary-container": "#00577e",
        tertiary: "#003f5c",
        "on-secondary": "#ffffff",
        "surface-tint": "#5148d7",
        "on-primary": "#ffffff",
        "tertiary-fixed": "#c9e6ff",
        secondary: "#4648d4",
        primary: "#2a14b4",
        "surface-container-high": "#dee8ff",
        "tertiary-fixed-dim": "#89ceff",
        "outline-variant": "#c7c4d7",
        "primary-fixed": "#e3dfff",
        "on-primary-fixed": "#100069",
        "surface-variant": "#d8e3fb",
        "on-tertiary-fixed": "#001e2f",
        "inverse-primary": "#c3c0ff",
        "secondary-fixed-dim": "#c0c1ff",
        surface: "#f9f9ff",
        outline: "#777586",
        "inverse-surface": "#263143",
        "on-surface-variant": "#464554",
        "on-tertiary": "#ffffff",
        "on-background": "#111c2d",
        "surface-container-lowest": "#ffffff",
        "on-primary-container": "#c1beff",
        "on-tertiary-fixed-variant": "#004c6e",
        "on-tertiary-container": "#84cdff",
        "surface-dim": "#cfdaf2",
        "inverse-on-surface": "#ecf1ff",
        error: "#ba1a1a",
        "on-secondary-fixed-variant": "#2f2ebe",
        "surface-container-highest": "#d8e3fb",
        "on-primary-fixed-variant": "#372abf",
        "surface-container": "#e7eeff",
        "error-container": "#ffdad6",
        "primary-fixed-dim": "#c3c0ff",
        "surface-container-low": "#f0f3ff",
        "primary-container": "#4338ca",
        "on-surface": "#111c2d",
        "secondary-container": "#6063ee",
        "on-error": "#ffffff",
        background: "#f9f9ff",
        "on-secondary-container": "#fffbff",
        "on-error-container": "#93000a",
        success: "#059669",
        "success-bg": "#d1fae5",
        warning: "#d97706",
        "warning-bg": "#fef3c7",
      },
      borderRadius: {
        DEFAULT: "0.25rem",
        lg: "0.5rem",
        xl: "0.75rem",
        full: "9999px",
      },
      spacing: {
        xs: "4px",
        xxl: "48px",
        base: "4px",
        xl: "32px",
        md: "16px",
        sm: "8px",
        gutter: "20px",
        lg: "24px",
        "margin-mobile": "16px",
        "margin-desktop": "40px",
      },
      fontFamily: {
        "headline-lg": ["Inter"],
        "body-md": ["Inter"],
        display: ["Inter"],
        "headline-md": ["Inter"],
        "body-lg": ["Inter"],
        "body-sm": ["Inter"],
        "headline-lg-mobile": ["Inter"],
        "label-md": ["Inter"],
      },
      fontSize: {
        "headline-lg": ["32px", { lineHeight: "1.2", letterSpacing: "-0.01em", fontWeight: "600" }],
        "body-md": ["16px", { lineHeight: "1.5", fontWeight: "400" }],
        display: ["48px", { lineHeight: "1.1", letterSpacing: "-0.02em", fontWeight: "700" }],
        "headline-md": ["24px", { lineHeight: "1.3", fontWeight: "600" }],
        "body-lg": ["18px", { lineHeight: "1.6", fontWeight: "400" }],
        "body-sm": ["14px", { lineHeight: "1.5", fontWeight: "400" }],
        "headline-lg-mobile": ["24px", { lineHeight: "1.2", fontWeight: "600" }],
        "label-md": ["12px", { lineHeight: "1", letterSpacing: "0.05em", fontWeight: "600" }],
      },
    },
  },
};
</script>
<style>
  body {
    background-color: #f9f9ff;
    -webkit-tap-highlight-color: transparent;
    font-feature-settings: "cv02", "cv03", "cv04", "cv11";
    font-family: 'Inter', sans-serif;
    min-height: 100dvh;
    padding-bottom: 90px;
  }
  .material-symbols-outlined {
    font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
  }
  .glass-card {
    background: rgba(255, 255, 255, 0.7);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid rgba(255, 255, 255, 0.4);
    box-shadow: 0 4px 12px rgba(67, 56, 202, 0.04);
  }
  .glass-card-solid {
    background: rgba(255, 255, 255, 0.9);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(255, 255, 255, 0.5);
    box-shadow: 0 4px 12px rgba(67, 56, 202, 0.06);
  }
  .bento-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 16px;
  }
  .modal-overlay {
    background: rgba(0, 0, 0, 0.35);
    backdrop-filter: blur(4px);
    z-index: 200;
  }
  .modal-overlay.hidden { display: none; }
  .safe-bottom {
    padding-bottom: env(safe-area-inset-bottom, 20px);
  }
  #toast {
    transform: translateY(20px);
    opacity: 0;
  }
  input[type="search"]::-webkit-search-decoration,
  input[type="search"]::-webkit-search-cancel-button,
  input[type="search"]::-webkit-search-results-button,
  input[type="search"]::-webkit-search-results-decoration {
    -webkit-appearance: none;
  }
  @media (max-width: 480px) {
    .bento-grid { gap: 12px; }
  }
</style>
</head>
<body class="font-body-md text-on-surface">

<!-- Top App Bar -->
<header class="bg-surface/80 backdrop-blur-xl w-full sticky top-0 z-50 border-b border-outline-variant/30 flex justify-between items-center px-margin-mobile h-[60px]">
  <div class="flex items-center gap-3">
    <button id="menu-toggle" class="w-10 h-10 flex items-center justify-center text-primary active:scale-95 transition-transform">
      <span class="material-symbols-outlined">menu</span>
    </button>
    <h1 id="page-title" class="font-headline-md text-xl font-bold tracking-tight text-on-surface">Dashboard</h1>
  </div>
  <div class="flex items-center gap-2">
    <button id="btn-export" class="w-10 h-10 flex items-center justify-center text-on-surface-variant active:scale-95 transition-transform" title="Exportar datos">
      <span class="material-symbols-outlined">file_download</span>
    </button>
    <button id="btn-import" class="w-10 h-10 flex items-center justify-center text-on-surface-variant active:scale-95 transition-transform" title="Importar datos">
      <span class="material-symbols-outlined">file_upload</span>
    </button>
  </div>

  <!-- Settings Menu Dropdown -->
  <div id="settings-menu" class="hidden absolute top-full right-2 mt-2 bg-white/90 backdrop-blur-xl border border-outline-variant/30 rounded-xl shadow-lg z-50 py-1.5 min-w-[180px]">
    <button class="w-full text-left px-4 py-2.5 text-sm hover:bg-primary/5 transition-all flex items-center gap-2.5 text-on-surface" data-action="export">
      <span class="material-symbols-outlined text-lg text-primary">file_download</span> Exportar datos
    </button>
    <button class="w-full text-left px-4 py-2.5 text-sm hover:bg-primary/5 transition-all flex items-center gap-2.5 text-on-surface" data-action="import">
      <span class="material-symbols-outlined text-lg text-primary">file_upload</span> Importar datos
    </button>
  </div>
</header>

<!-- Main Content -->
<main class="px-margin-mobile py-8 space-y-8 max-w-4xl mx-auto" id="content"></main>

<!-- FAB -->
<button class="fixed right-6 bottom-24 w-16 h-16 bg-primary text-white rounded-2xl shadow-xl shadow-primary/20 flex items-center justify-center transition-all active:scale-90 z-40" id="fab-add" data-fab>
  <span class="material-symbols-outlined text-3xl">add</span>
</button>

<!-- ═══ MODALS ═══ -->

<!-- Confirm Modal -->
<div class="modal-overlay fixed inset-0 hidden items-center justify-center p-6" id="modal-confirm">
  <div class="glass-card-solid rounded-xl w-full max-w-sm p-6 space-y-4">
    <p id="confirm-msg" class="text-sm text-on-surface"></p>
    <div class="flex gap-2 justify-end">
      <button id="confirm-no" class="px-4 py-2.5 text-sm font-medium rounded-lg border border-outline-variant/50 hover:bg-surface-container-low transition-all">Cancelar</button>
      <button id="confirm-yes" class="px-4 py-2.5 text-sm font-medium rounded-lg bg-primary text-white hover:bg-primary/90 transition-all">Confirmar</button>
    </div>
  </div>
</div>

<!-- Producto Modal -->
<div class="modal-overlay fixed inset-0 hidden items-center justify-center p-4" id="modal-producto">
  <div class="glass-card-solid rounded-xl w-full max-w-lg max-h-[90vh] overflow-y-auto shadow-xl">
    <div class="flex items-center justify-between p-5 border-b border-outline-variant/30">
      <h3 id="modal-producto-title" class="font-headline-md text-lg font-semibold">Nuevo producto</h3>
      <button class="modal-close w-9 h-9 flex items-center justify-center rounded-lg hover:bg-surface-container-low transition-all text-on-surface-variant" data-close="modal-producto">
        <span class="material-symbols-outlined">close</span>
      </button>
    </div>
    <div class="p-5 space-y-4">
      <div class="grid grid-cols-2 gap-3">
        <div class="space-y-1.5">
          <label class="text-xs font-semibold text-on-surface-variant/70 uppercase tracking-wider">Nombre *</label>
          <input type="text" id="p-nombre" placeholder="Ej. Pijama quirúrgica azul" class="w-full px-3.5 py-2.5 bg-white/80 border border-outline-variant/40 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary/50 transition-all">
        </div>
        <div class="space-y-1.5">
          <label class="text-xs font-semibold text-on-surface-variant/70 uppercase tracking-wider">Categoría</label>
          <select id="p-categoria" class="w-full px-3.5 py-2.5 bg-white/80 border border-outline-variant/40 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary/50 transition-all">
            <option value="Uniformes médicos">Uniformes médicos</option>
            <option value="Maquillaje">Maquillaje</option>
            <option value="Accesorios">Accesorios</option>
            <option value="Otro">Otro</option>
          </select>
        </div>
      </div>
      <div class="grid grid-cols-2 gap-3">
        <div class="space-y-1.5">
          <label class="text-xs font-semibold text-on-surface-variant/70 uppercase tracking-wider">Precio costo ($)</label>
          <input type="number" id="p-costo" placeholder="0.00" min="0" step="0.01" class="w-full px-3.5 py-2.5 bg-white/80 border border-outline-variant/40 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary/50 transition-all">
        </div>
        <div class="space-y-1.5">
          <label class="text-xs font-semibold text-on-surface-variant/70 uppercase tracking-wider">Precio venta ($)</label>
          <input type="number" id="p-venta" placeholder="0.00" min="0" step="0.01" class="w-full px-3.5 py-2.5 bg-white/80 border border-outline-variant/40 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary/50 transition-all">
        </div>
      </div>
      <div class="grid grid-cols-2 gap-3">
        <div class="space-y-1.5">
          <label class="text-xs font-semibold text-on-surface-variant/70 uppercase tracking-wider">Stock actual</label>
          <input type="number" id="p-stock" placeholder="0" min="0" class="w-full px-3.5 py-2.5 bg-white/80 border border-outline-variant/40 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary/50 transition-all">
        </div>
        <div class="space-y-1.5">
          <label class="text-xs font-semibold text-on-surface-variant/70 uppercase tracking-wider">Stock mínimo</label>
          <input type="number" id="p-stock-min" placeholder="5" min="0" class="w-full px-3.5 py-2.5 bg-white/80 border border-outline-variant/40 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary/50 transition-all">
        </div>
      </div>
      <div class="space-y-1.5">
        <label class="text-xs font-semibold text-on-surface-variant/70 uppercase tracking-wider">Descripción / Talla</label>
        <textarea id="p-desc" placeholder="Ej. Talla M, color azul marino..." class="w-full px-3.5 py-2.5 bg-white/80 border border-outline-variant/40 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary/50 transition-all resize-none min-h-[60px]"></textarea>
      </div>
    </div>
    <div class="flex justify-end gap-2 p-5 border-t border-outline-variant/30">
      <button class="modal-close px-4 py-2.5 text-sm font-medium rounded-lg border border-outline-variant/50 hover:bg-surface-container-low transition-all" data-close="modal-producto">Cancelar</button>
      <button class="px-4 py-2.5 text-sm font-medium rounded-lg bg-primary text-white hover:bg-primary/90 transition-all" onclick="saveProducto()">Guardar</button>
    </div>
  </div>
</div>

<!-- Cliente Modal -->
<div class="modal-overlay fixed inset-0 hidden items-center justify-center p-4" id="modal-cliente">
  <div class="glass-card-solid rounded-xl w-full max-w-lg max-h-[90vh] overflow-y-auto shadow-xl">
    <div class="flex items-center justify-between p-5 border-b border-outline-variant/30">
      <h3 id="modal-cliente-title" class="font-headline-md text-lg font-semibold">Nuevo cliente</h3>
      <button class="modal-close w-9 h-9 flex items-center justify-center rounded-lg hover:bg-surface-container-low transition-all text-on-surface-variant" data-close="modal-cliente">
        <span class="material-symbols-outlined">close</span>
      </button>
    </div>
    <div class="p-5 space-y-4">
      <div class="grid grid-cols-2 gap-3">
        <div class="space-y-1.5">
          <label class="text-xs font-semibold text-on-surface-variant/70 uppercase tracking-wider">Nombre *</label>
          <input type="text" id="c-nombre" placeholder="Ej. María González" class="w-full px-3.5 py-2.5 bg-white/80 border border-outline-variant/40 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary/50 transition-all">
        </div>
        <div class="space-y-1.5">
          <label class="text-xs font-semibold text-on-surface-variant/70 uppercase tracking-wider">Cédula / RUC</label>
          <input type="text" id="c-cedula" placeholder="0000000000" class="w-full px-3.5 py-2.5 bg-white/80 border border-outline-variant/40 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary/50 transition-all">
        </div>
      </div>
      <div class="grid grid-cols-2 gap-3">
        <div class="space-y-1.5">
          <label class="text-xs font-semibold text-on-surface-variant/70 uppercase tracking-wider">Teléfono</label>
          <input type="tel" id="c-telefono" placeholder="0999999999" class="w-full px-3.5 py-2.5 bg-white/80 border border-outline-variant/40 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary/50 transition-all">
        </div>
        <div class="space-y-1.5">
          <label class="text-xs font-semibold text-on-surface-variant/70 uppercase tracking-wider">Email</label>
          <input type="email" id="c-email" placeholder="correo@ejemplo.com" class="w-full px-3.5 py-2.5 bg-white/80 border border-outline-variant/40 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary/50 transition-all">
        </div>
      </div>
      <div class="space-y-1.5">
        <label class="text-xs font-semibold text-on-surface-variant/70 uppercase tracking-wider">Dirección</label>
        <input type="text" id="c-direccion" placeholder="Calle, sector..." class="w-full px-3.5 py-2.5 bg-white/80 border border-outline-variant/40 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary/50 transition-all">
      </div>
      <div class="space-y-1.5">
        <label class="text-xs font-semibold text-on-surface-variant/70 uppercase tracking-wider">Notas</label>
        <textarea id="c-notas" placeholder="Observaciones del cliente..." class="w-full px-3.5 py-2.5 bg-white/80 border border-outline-variant/40 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary/50 transition-all resize-none min-h-[60px]"></textarea>
      </div>
    </div>
    <div class="flex justify-end gap-2 p-5 border-t border-outline-variant/30">
      <button class="modal-close px-4 py-2.5 text-sm font-medium rounded-lg border border-outline-variant/50 hover:bg-surface-container-low transition-all" data-close="modal-cliente">Cancelar</button>
      <button class="px-4 py-2.5 text-sm font-medium rounded-lg bg-primary text-white hover:bg-primary/90 transition-all" onclick="saveCliente()">Guardar</button>
    </div>
  </div>
</div>

<!-- Venta Modal -->
<div class="modal-overlay fixed inset-0 hidden items-center justify-center p-4" id="modal-venta">
  <div class="glass-card-solid rounded-xl w-full max-w-xl max-h-[90vh] overflow-y-auto shadow-xl">
    <div class="flex items-center justify-between p-5 border-b border-outline-variant/30">
      <h3 class="font-headline-md text-lg font-semibold">Nueva venta</h3>
      <button class="modal-close w-9 h-9 flex items-center justify-center rounded-lg hover:bg-surface-container-low transition-all text-on-surface-variant" data-close="modal-venta">
        <span class="material-symbols-outlined">close</span>
      </button>
    </div>
    <div class="p-5 space-y-4">
      <div class="grid grid-cols-2 gap-3">
        <div class="space-y-1.5">
          <label class="text-xs font-semibold text-on-surface-variant/70 uppercase tracking-wider">Cliente</label>
          <select id="v-cliente" class="w-full px-3.5 py-2.5 bg-white/80 border border-outline-variant/40 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary/50 transition-all">
            <option value="">— Consumidor final —</option>
          </select>
        </div>
        <div class="space-y-1.5">
          <label class="text-xs font-semibold text-on-surface-variant/70 uppercase tracking-wider">Fecha</label>
          <input type="date" id="v-fecha" class="w-full px-3.5 py-2.5 bg-white/80 border border-outline-variant/40 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary/50 transition-all">
        </div>
      </div>
      <div class="space-y-1.5">
        <label class="text-xs font-semibold text-on-surface-variant/70 uppercase tracking-wider">Forma de pago</label>
        <select id="v-pago" class="w-full px-3.5 py-2.5 bg-white/80 border border-outline-variant/40 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary/50 transition-all">
          <option value="Efectivo">Efectivo</option>
          <option value="Transferencia">Transferencia</option>
          <option value="Tarjeta">Tarjeta</option>
          <option value="Crédito">Crédito (cuenta por cobrar)</option>
        </select>
      </div>

      <div class="flex items-center justify-between">
        <label class="text-xs font-semibold text-on-surface-variant/70 uppercase tracking-wider">Productos</label>
        <button class="flex items-center gap-1 px-3 py-1.5 border border-outline-variant/40 rounded-lg text-sm font-medium hover:bg-primary/5 transition-all active:scale-95" onclick="addSaleItem()">
          <span class="material-symbols-outlined text-lg">add</span>
          Agregar
        </button>
      </div>
      <div id="sale-items">
        <p class="text-center py-4 text-on-surface-variant text-sm">Agrega al menos un producto</p>
      </div>

      <div class="border-t border-outline-variant/30 pt-4 flex justify-between items-center">
        <span class="text-sm text-on-surface-variant">Total</span>
        <span id="v-total" class="text-[28px] font-bold text-primary tracking-tight">$0.00</span>
      </div>

      <div class="space-y-1.5">
        <label class="text-xs font-semibold text-on-surface-variant/70 uppercase tracking-wider">Notas</label>
        <textarea id="v-notas" placeholder="Observaciones de la venta..." class="w-full px-3.5 py-2.5 bg-white/80 border border-outline-variant/40 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary/50 transition-all resize-none min-h-[60px]"></textarea>
      </div>
    </div>
    <div class="flex justify-end gap-2 p-5 border-t border-outline-variant/30">
      <button class="modal-close px-4 py-2.5 text-sm font-medium rounded-lg border border-outline-variant/50 hover:bg-surface-container-low transition-all" data-close="modal-venta">Cancelar</button>
      <button class="px-4 py-2.5 text-sm font-medium rounded-lg bg-primary text-white hover:bg-primary/90 transition-all" onclick="saveVenta()">Registrar venta</button>
    </div>
  </div>
</div>

<!-- Cuenta por cobrar Modal -->
<div class="modal-overlay fixed inset-0 hidden items-center justify-center p-4" id="modal-cobrar">
  <div class="glass-card-solid rounded-xl w-full max-w-lg max-h-[90vh] overflow-y-auto shadow-xl">
    <div class="flex items-center justify-between p-5 border-b border-outline-variant/30">
      <h3 id="modal-cobrar-title" class="font-headline-md text-lg font-semibold">Nueva cuenta por cobrar</h3>
      <button class="modal-close w-9 h-9 flex items-center justify-center rounded-lg hover:bg-surface-container-low transition-all text-on-surface-variant" data-close="modal-cobrar">
        <span class="material-symbols-outlined">close</span>
      </button>
    </div>
    <div class="p-5 space-y-4">
      <div class="grid grid-cols-2 gap-3">
        <div class="space-y-1.5">
          <label class="text-xs font-semibold text-on-surface-variant/70 uppercase tracking-wider">Cliente *</label>
          <select id="cc-cliente" class="w-full px-3.5 py-2.5 bg-white/80 border border-outline-variant/40 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary/50 transition-all">
            <option value="">Seleccionar...</option>
          </select>
        </div>
        <div class="space-y-1.5">

        </div>
        <div class="space-y-1.5">

      <button class="px-4 py-2.5 text-sm font-medium rounded-lg bg-primary text-white hover:bg-primary/90 transition-all" onclick="saveCuentaPagar()">Guardar</button>
